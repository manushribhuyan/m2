<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:550px;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

h1{
  text-align:center;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:20px;
}

.input-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
}

.add-btn{
  background:#2563eb;
  color:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:20px 0;
}

.card{
  background:#f1f5f9;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.card h2{
  font-size:22px;
}

.filters{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.filter-btn{
  background:#e0e7ff;
  flex:1;
}

ul{
  list-style:none;
}

li{
  background:#f8fafc;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.done{
  text-decoration:line-through;
  opacity:0.6;
}

.actions{
  display:flex;
  gap:6px;
}

.complete-btn{
  background:#16a34a;
  color:white;
}

.delete-btn{
  background:#ef4444;
  color:white;
}

.empty{
  text-align:center;
  color:#777;
  padding:20px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 Task Manager Pro</h1>
  <div class="subtitle">DevOps Mini Project • Docker • CI/CD</div>

  <div class="input-box">
    <input id="task" placeholder="Enter task">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <div class="stats">
    <div class="card">
      <h2 id="total">0</h2>
      <p>Total</p>
    </div>
    <div class="card">
      <h2 id="completed">0</h2>
      <p>Done</p>
    </div>
    <div class="card">
      <h2 id="pending">0</h2>
      <p>Pending</p>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn" onclick="setFilter('all')">All</button>
    <button class="filter-btn" onclick="setFilter('active')">Active</button>
    <button class="filter-btn" onclick="setFilter('done')">Done</button>
  </div>

  <ul id="list"></ul>
</div>

<script>
let tasks = [];
let filter = "all";

function renderTasks(){
  let filtered = tasks.filter(task=>{
    if(filter==="done") return task.done;
    if(filter==="active") return !task.done;
    return true;
  });

  const list = document.getElementById("list");

  if(filtered.length===0){
    list.innerHTML = '<div class="empty">No tasks found</div>';
  } else {
    list.innerHTML = filtered.map(task => `
      <li>
        <span class="${task.done ? 'done' : ''}">${task.title}</span>
        <div class="actions">
          <button class="complete-btn" onclick="toggleTask('${task._id}')">✓</button>
          <button class="delete-btn" onclick="deleteTask('${task._id}')">Delete</button>
        </div>
      </li>
    `).join('');
  }

  document.getElementById("total").innerText = tasks.length;
  document.getElementById("completed").innerText = tasks.filter(t=>t.done).length;
  document.getElementById("pending").innerText = tasks.filter(t=>!t.done).length;
}

async function loadTasks(){
  const res = await fetch('/tasks');
  tasks = await res.json();
  renderTasks();
}

async function addTask(){
  const input = document.getElementById("task");
  const title = input.value.trim();

  if(title==="") return;

  await fetch('/tasks',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,done:false})
  });

  input.value="";
  loadTasks();
}

async function deleteTask(id){
  await fetch('/tasks/'+id,{method:'DELETE'});
  loadTasks();
}

async function toggleTask(id){
  await fetch('/tasks/'+id,{method:'PUT'});
  loadTasks();
}

function setFilter(type){
  filter = type;
  renderTasks();
}

loadTasks();
</script>

</body>
</html>
